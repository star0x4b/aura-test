name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: web-server
            dockerfile: apps/web-server/Dockerfile
          - name: customer-management
            dockerfile: apps/customer-management/Dockerfile
          - name: frontend
            dockerfile: apps/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm dependency build infra/helm/aura-system
          helm upgrade --install aura-system infra/helm/aura-system \
            --namespace aura-system \
            --create-namespace \
            --set webServer.image.repository=${{ env.IMAGE_PREFIX }}/web-server \
            --set webServer.image.tag=${{ github.sha }} \
            --set customerManagement.image.repository=${{ env.IMAGE_PREFIX }}/customer-management \
            --set customerManagement.image.tag=${{ github.sha }} \
            --set frontend.image.repository=${{ env.IMAGE_PREFIX }}/frontend \
            --set frontend.image.tag=${{ github.sha }} \
            --wait --timeout 5m
