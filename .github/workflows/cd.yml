name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # Detect which services changed so we only build and push affected images.
  changes:
    runs-on: ubuntu-latest
    outputs:
      web-server: ${{ steps.filter.outputs.web-server }}
      customer-management: ${{ steps.filter.outputs.customer-management }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web-server:
              - 'apps/web-server/**'
              - 'packages/shared/**'
            customer-management:
              - 'apps/customer-management/**'
              - 'packages/shared/**'
            frontend:
              - 'apps/frontend/**'

  build-and-push-web-server:
    needs: changes
    if: needs.changes.outputs.web-server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web-server:latest
            ${{ env.IMAGE_PREFIX }}/web-server:${{ github.sha }}
          cache-from: type=gha,scope=web-server
          cache-to: type=gha,scope=web-server,mode=max

  build-and-push-customer-management:
    needs: changes
    if: needs.changes.outputs.customer-management == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/customer-management/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/customer-management:latest
            ${{ env.IMAGE_PREFIX }}/customer-management:${{ github.sha }}
          cache-from: type=gha,scope=customer-management
          cache-to: type=gha,scope=customer-management,mode=max

  build-and-push-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

