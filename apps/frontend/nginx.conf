# nginx serves the React SPA and proxies API calls to the web-server service.
# In Kubernetes, "web-server" resolves via the ClusterIP service DNS name.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward /api/* requests to the web-server backend
    location /api/ {
        proxy_pass http://web-server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
